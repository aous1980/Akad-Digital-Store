    <style>
        :root { --main-bg: #0b0f12; --card-bg: rgba(22, 27, 32, 0.8); --accent: #00ff88; --text: #ffffff; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: var(--main-bg); color: var(--text); margin: 0; padding: 20px; direction: rtl; }
        header { text-align: center; padding: 30px 0; }

        .price { font-size: 1.2rem; color: var(--accent); font-weight: bold; }
        .buy-btn { display: block; background: #25d366; color: white; padding: 10px; border-radius: 8px; text-decoration: none; margin-top: 15px; font-weight: bold; }
    </style>
</head>

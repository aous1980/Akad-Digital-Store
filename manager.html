<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة تحكم Akad Digital - دخول مباشر</title>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <style>
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: #f4f7f6; margin: 0; padding: 20px; }
        .admin-container { max-width: 900px; margin: 0 auto; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 5px 20px rgba(0,0,0,0.1); }
        h2 { color: #2c3e50; border-bottom: 2px solid #00ff88; padding-bottom: 10px; margin-top: 30px; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; color: #444; }
        input, select, textarea { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; background: #fafafa; }
        button { background: #2c3e50; color: white; border: none; padding: 12px 25px; border-radius: 8px; cursor: pointer; font-weight: bold; width: 100%; transition: 0.3s; }
        button:hover { background: #00ff88; color: #000; }
        .item-card { background: #fff; border: 1px solid #eee; padding: 15px; margin-bottom: 10px; border-radius: 10px; display: flex; justify-content: space-between; align-items: center; border-right: 5px solid #00ff88; }
        .btn-delete { background: #ff4757; width: auto; padding: 5px 15px; font-size: 0.8rem; }
        .header-bar { display: flex; justify-content: space-between; align-items: center; background: #2c3e50; color: white; padding: 15px 30px; border-radius: 15px; margin-bottom: 20px; }
    </style>
</head>
<body>

    <div class="admin-container">
        <div class="header-bar">
            <h1 style="margin:0; font-size: 1.5rem;">لوحة إدارة Akad Digital Store</h1>
            <span style="color: #00ff88;">● متصل الآن</span>
        </div>

        <h2>إضافة منتج جديد</h2>
        <div class="form-group">
            <label>اسم المنتج (مثلاً: X96Q Box)</label>
            <input type="text" id="pName">
        </div>
        <div class="form-group">
            <label>القسم</label>
            <select id="pCat"></select>
        </div>
        <div class="form-group">
            <label>السعر (مثلاً: 45,000 د.ع)</label>
            <input type="text" id="pPrice">
        </div>
        <div class="form-group">
            <label>رابط الصورة</label>
            <input type="text" id="pImg" placeholder="انسخ رابط صورة الجهاز هنا">
        </div>
        <div class="form-group">
            <label>المواصفات المختصرة</label>
            <textarea id="pNotes" rows="2"></textarea>
        </div>
        <button onclick="addProduct()">نشر المنتج في المتجر 🚀</button>

        <hr style="margin: 40px 0; border: 0; border-top: 1px solid #eee;">

        <h2>إدارة الأقسام</h2>
        <p style="font-size: 0.8rem; color: #666;">(يجب إضافة قسم واحد على الأقل أولاً)</p>
        <div style="display: flex; gap: 10px;">
            <input type="text" id="newCat" placeholder="اسم القسم الجديد (مثلاً: كاميرات)">
            <button onclick="addCategory()" style="width: auto;">إضافة</button>
        </div>

        <div class="product-list">
            <h2>المنتجات المنشورة</h2>
            <div id="currentProducts"></div>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBcWwHSDX9kWVxbw1DLgGkTJoYFSBsdeuk",
            authDomain: "aws-store-aaf40.firebaseapp.com",
            databaseURL: "https://aws-store-aaf40-default-rtdb.firebaseio.com",
            projectId: "aws-store-aaf40",
            appId: "1:962301504605:web:96661f5c465b2cfd4331b4"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // تحميل البيانات فوراً عند فتح الصفحة
        window.onload = function() {
            loadData();
        };

        function addCategory() {
            const name = document.getElementById('newCat').value;
            if(name) {
                db.ref('categories').push({ name: name });
                document.getElementById('newCat').value = "";
            }
        }

        function addProduct() {
            const product = {
                name: document.getElementById('pName').value,
                cat: document.getElementById('pCat').value,
                ver: document.getElementById('pPrice').value,
                img: document.getElementById('pImg').value,
                notes: document.getElementById('pNotes').value,
                url: "#"
            };

            if(product.name && product.cat) {
                db.ref('apps').push(product).then(() => {
                    alert("تم النشر بنجاح!");
                    document.getElementById('pName').value = "";
                    document.getElementById('pPrice').value = "";
                    document.getElementById('pImg').value = "";
                    document.getElementById('pNotes').value = "";
                });
            } else {
                alert("يرجى ملء الاسم والقسم");
            }
        }

        function loadData() {
            db.ref('categories').on('value', s => {
                let options = "";
                s.forEach(c => { options += `<option value="${c.val().name}">${c.val().name}</option>`; });
                document.getElementById('pCat').innerHTML = options;
            });

            db.ref('apps').on('value', s => {
                let html = "";
                s.forEach(p => {
                    html += `
                    <div class="item-card">
                        <div><strong>${p.val().name}</strong> - <span style="color:#2ecc71">${p.val().ver}</span></div>
                        <button class="btn-delete" onclick="deleteItem('${p.key}')">حذف</button>
                    </div>`;
                });
                document.getElementById('currentProducts').innerHTML = html;
            });
        }

        function deleteItem(id) {
            if(confirm("هل تريد حذف هذا المنتج؟")) {
                db.ref('apps').child(id).remove();
            }
        }
    </script>
</body>
</html>

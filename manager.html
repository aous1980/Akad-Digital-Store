
<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة تحكم Akad Digital</title>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <style>
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: #f4f7f6; margin: 0; padding: 20px; }
        .admin-container { max-width: 900px; margin: 0 auto; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 5px 20px rgba(0,0,0,0.1); }
        h2 { color: #2c3e50; border-bottom: 2px solid #00ff88; padding-bottom: 10px; }
        
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
        input, select, textarea { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        
        button { background: #2c3e50; color: white; border: none; padding: 12px 25px; border-radius: 8px; cursor: pointer; font-weight: bold; width: 100%; }
        button:hover { background: #1a252f; }
        
        .product-list { margin-top: 40px; }
        .item-card { background: #fff; border: 1px solid #eee; padding: 15px; margin-bottom: 10px; border-radius: 10px; display: flex; justify-content: space-between; align-items: center; }
        .btn-delete { background: #ff4757; width: auto; padding: 5px 15px; }

        #loginSection { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #2c3e50; color: white; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 1000; }
        .hidden { display: none; }
    </style>
</head>
<body>

    <div id="loginSection">
        <h1 style="color: #00ff88;">Akad Digital Admin</h1>
        <div style="width: 300px;">
            <input type="email" id="adminEmail" placeholder="البريد الإلكتروني" style="margin-bottom: 10px;">
            <input type="password" id="adminPass" placeholder="كلمة المرور" style="margin-bottom: 10px;">
            <button onclick="login()">دخول</button>
        </div>
    </div>

    <div id="adminPanel" class="admin-container hidden">
        <h2>إضافة منتج جديد (TV Box, كاميرات، إلخ)</h2>
        
        <div class="form-group">
            <label>اسم المنتج</label>
            <input type="text" id="pName" placeholder="مثلاً: X96Q Android Box">
        </div>

        <div class="form-group">
            <label>القسم</label>
            <select id="pCat"></select>
        </div>

        <div class="form-group">
            <label>السعر</label>
            <input type="text" id="pPrice" placeholder="مثلاً: 45,000 د.ع">
        </div>

        <div class="form-group">
            <label>رابط صورة المنتج</label>
            <input type="text" id="pImg" placeholder="أدخل رابط صورة PNG أو JPG">
        </div>

        <div class="form-group">
            <label>المواصفات (الوصف)</label>
            <textarea id="pNotes" rows="3" placeholder="المعالج، الرام، الذاكرة..."></textarea>
        </div>

        <button onclick="addProduct()">حفظ ونشر المنتج ✅</button>

        <hr>

        <h2>إدارة الأقسام</h2>
        <div style="display: flex; gap: 10px;">
            <input type="text" id="newCat" placeholder="اسم القسم الجديد">
            <button onclick="addCategory()" style="width: auto;">إضافة قسم</button>
        </div>

        <div class="product-list">
            <h2>المنتجات الحالية</h2>
            <div id="currentProducts"></div>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBcWwHSDX9kWVxbw1DLgGkTJoYFSBsdeuk",
            authDomain: "aws-store-aaf40.firebaseapp.com",
            databaseURL: "https://aws-store-aaf40-default-rtdb.firebaseio.com",
            projectId: "aws-store-aaf40",
            appId: "1:962301504605:web:96661f5c465b2cfd4331b4"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const auth = firebase.auth();

        // تسجيل الدخول
        function login() {
            const email = document.getElementById('adminEmail').value;
            const pass = document.getElementById('adminPass').value;
            auth.signInWithEmailAndPassword(email, pass)
                .then(() => {
                    document.getElementById('loginSection').classList.add('hidden');
                    document.getElementById('adminPanel').classList.remove('hidden');
                    loadData();
                })
                .catch(err => alert("خطأ في الدخول: " + err.message));
        }

        // إضافة قسم
        function addCategory() {
            const name = document.getElementById('newCat').value;
            if(name) {
                db.ref('categories').push({ name: name });
                document.getElementById('newCat').value = "";
            }
        }

        // إضافة منتج
        function addProduct() {
            const product = {
                name: document.getElementById('pName').value,
                cat: document.getElementById('pCat').value,
                ver: document.getElementById('pPrice').value, // حقل السعر
                img: document.getElementById('pImg').value,
                notes: document.getElementById('pNotes').value,
                url: "#" // رابط افتراضي
            };

            if(product.name && product.cat) {
                db.ref('apps').push(product).then(() => {
                    alert("تمت إضافة المنتج بنجاح!");
                    document.querySelectorAll('input').forEach(i => i.value = "");
                });
            } else {
                alert("يرجى ملء الاسم والقسم على الأقل");
            }
        }

        // تحميل البيانات للوحة
        function loadData() {
            // جلب الأقسام للقائمة المنسدلة
            db.ref('categories').on('value', s => {
                let options = "";
                s.forEach(c => {
                    options += `<option value="${c.val().name}">${c.val().name}</option>`;
                });
                document.getElementById('pCat').innerHTML = options;
            });

            // جلب المنتجات لعرضها وحذفها
            db.ref('apps').on('value', s => {
                let html = "";
                s.forEach(p => {
                    html += `
                    <div class="item-card">
                        <div>
                            <strong>${p.val().name}</strong> - ${p.val().ver}
                        </div>
                        <button class="btn-delete" onclick="deleteItem('${p.key}')">حذف</button>
                    </div>`;
                });
                document.getElementById('currentProducts').innerHTML = html;
            });
        }

        function deleteItem(id) {
            if(confirm("هل أنت متأكد من حذف هذا المنتج؟")) {
                db.ref('apps').child(id).remove();
            }
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة إدارة أكد ديجيتال</title>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <style>
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: #f0f2f5; padding: 20px; direction: rtl; text-align: right; }
        .box { background: white; padding: 25px; border-radius: 12px; max-width: 700px; margin: 0 auto 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); border-top: 4px solid #00ff88; }
        h2 { color: #2c3e50; margin-top: 0; font-size: 1.4rem; }
        input, select, textarea { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 1rem; }
        button { background: #2c3e50; color: white; border: none; padding: 12px 20px; border-radius: 8px; cursor: pointer; width: 100%; font-weight: bold; transition: 0.3s; }
        button:hover { background: #00ff88; color: black; }
        .list-item { display: flex; justify-content: space-between; align-items: center; background: #fff; padding: 12px; margin-top: 8px; border: 1px solid #eee; border-radius: 8px; }
        .del-btn { background: #ff4757; width: auto; padding: 5px 12px; font-size: 0.8rem; }
        .del-btn:hover { background: #ff2e44; color: white; }
    </style>
</head>
<body>

<div class="box">
    <h2>➕ إضافة منتج جديد</h2>
    <label>اسم الجهاز:</label>
    <input type="text" id="pName" placeholder="مثلاً: X96Q Box">
    
    <label>اختر القسم:</label>
    <select id="pCat"></select>
    
    <label>السعر:</label>
    <input type="text" id="pPrice" placeholder="مثلاً: 45,000 د.ع">
    
    <label>رابط الصورة:</label>
    <input type="text" id="pImg" placeholder="انسخ رابط صورة الجهاز">
    
    <label>المواصفات:</label>
    <textarea id="pNotes" rows="2" placeholder="الرام، الذاكرة، إلخ..."></textarea>
    
    <button onclick="addProduct()">🚀 نشر في المتجر</button>
</div>

<div class="box">
    <h2>📁 إدارة الأقسام</h2>
    <div style="display:flex; gap:10px;">
        <input type="text" id="newCat" placeholder="اسم القسم الجديد">
        <button onclick="addCat()" style="width:auto;">إضافة</button>
    </div>
    <div id="catsList"></div>
</div>

<div class="box">
    <h2>📦 المنتجات المنشورة</h2>
    <div id="prodsList"></div>
</div>

        firebase.initializeApp(firebaseConfig);

    function addCat() {
        const val = document.getElementById('newCat').value;
        if(val) {
            db.ref('categories').push({name: val});
            document.getElementById('newCat').value = "";
        }
    }

            name: document.getElementById('pName').value,

            ver: document.getElementById('pPrice').value,
            img: document.getElementById('pImg').value,
            notes: document.getElementById('pNotes').value
        };
        if(p.name && p.cat) {
            db.ref('apps').push(p).then(() => {
                alert("تم بنجاح! سيظهر المنتج في المتجر الآن.");

                document.getElementById('pPrice').value = "";
            });
        } else {
            alert("يرجى إدخال الاسم واختيار القسم");
        }
    }

    // تحديث قائمة الأقسام تلقائياً

        });
        document.getElementById('pCat').innerHTML = opt;
        document.getElementById('catsList').innerHTML = list;
    });
